<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">

<style>
* {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
  font-family: 'Noto Sans KR', sans-serif;
}

body {
  background: #F5F5F5;
}

.app {
  max-width: 100%;
  margin: 0 auto;
}

.header {
  background: #1A73E8;
  color: white;
  padding: 12px;
  display: flex;
  justify-content: space-between;
  align-items: center;
}

.header-title {
  font-weight: 700;
  font-size: 16px;
}

.tab-bar {
  display: flex;
  background: white;
}

.tab {
  flex: 1;
  padding: 12px;
  text-align: center;
  font-weight: 700;
  border-bottom: 3px solid transparent;
}

.tab.active {
  color: #1565C0;
  border-bottom: 3px solid #1565C0;
}

.ctrl-row {
  display: flex;
  align-items: center;
  padding: 10px;
  background: white;
  gap: 6px;
  flex-wrap: wrap;
}

.ctrl-label {
  font-weight: 700;
}

.thr-inp {
  width: 42px;
  border: 2px solid orange;
  border-radius: 6px;
  text-align: center;
  font-weight: 700;
}

.btn-edit-ctrl {
  margin-left: auto;
  border: 1.5px solid #1565C0;
  background: white;
  color: #1565C0;
  border-radius: 6px;
  padding: 6px 10px;
  font-weight: 700;
}

.tbl-wrap {
  overflow-x: auto;
}

table {
  width: 100%;
  min-width: 600px;
  border-collapse: collapse;
  background: white;
}

th, td {
  border-bottom: 1px solid #eee;
  text-align: center;
  padding: 6px;
  font-size: 12px;
}

.name {
  font-weight: 700;
}

.n-inp {
  width: 40px;
  text-align: center;
}

.hidden {
  display: none;
}
</style>
</head>

<body>

<div class="app">

<div class="header">
  <div class="header-title">점프UP MANAGER</div>
  <div>2026.04.19</div>
</div>

<div class="tab-bar">
  <div class="tab active" onclick="showTab('sy')" id="tab-sy">📋 생산율</div>
  <div class="tab" onclick="showTab('369')" id="tab-369">📊 3.6.9</div>
</div>

<!-- 생산율 -->
<div id="view-sy">

<div class="ctrl-row">
  <span class="ctrl-label">부족기준</span>
  <input class="thr-inp" id="thr" value="3">
  <span>%</span>

  <button class="btn-edit-ctrl">수정/추가</button>
</div>

<div class="tbl-wrap">
<table>
<thead>
<tr>
<th>이름</th>
<th>관리</th>
<th>신규</th>
<th>재랜탈</th>
<th>자가</th>
<th>환산</th>
<th>금액</th>
</tr>
</thead>

<tbody id="tbody"></tbody>

</table>
</div>

</div>

<!-- 3.6.9 -->
<div id="view-369" class="hidden">

<div class="tbl-wrap">
<table>
<thead>
<tr>
<th>이름</th>
<th>신규</th>
<th>재랜탈</th>
<th>자가</th>
<th>환산</th>
<th>금액</th>
</tr>
</thead>

<tbody id="tbody369"></tbody>

</table>
</div>

</div>

</div>

<script>

let members = ['박행신','강승임','박일녀','임병순'];

function render(){

let html = '';
members.forEach(n=>{
html += `
<tr>
<td class="name">${n}</td>
<td><input class="n-inp"></td>
<td><input class="n-inp"></td>
<td><input class="n-inp"></td>
<td><input class="n-inp"></td>
<td>-</td>
<td>-</td>
</tr>
`;
});

document.getElementById('tbody').innerHTML = html;
document.getElementById('tbody369').innerHTML = html;

}

function showTab(tab){
document.getElementById('view-sy').classList.toggle('hidden', tab !== 'sy');
document.getElementById('view-369').classList.toggle('hidden', tab !== '369');
document.getElementById('tab-sy').classList.toggle('active', tab === 'sy');
document.getElementById('tab-369').classList.toggle('active', tab === '369');
}

render();

</script>

</body>
</html>
