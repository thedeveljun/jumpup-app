<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>점프UP MANAGER</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* [기존 스타일 유지하되 모바일 최적화 추가] */
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; -webkit-tap-highlight-color: transparent; }
        :root {
            --blue: #1565C0; --green: #2E7D32;
            --orange: #E65100; --red: #C62828; --purple: #6A1B9A; --teal: #00695C;
            --gray-bg: #F5F5F5; --gray-border: #E0E0E0; --text: #212121; --text-muted: #9E9E9E;
        }
        body { background: var(--gray-bg); }
        .app { max-width: 520px; margin: 0 auto; background: var(--gray-bg); min-height: 100vh; position: relative; }
        .header { background: #1A73E8; color: white; padding: 11px 14px; display: flex; align-items: center; gap: 8px; position: sticky; top: 0; z-index: 100; }
        .header-title { font-size: 17px; font-weight: 700; flex: 1; }
        .header-date { font-size: 13px; color: rgba(255,255,255,0.8); }
        .tab-bar { background: white; border-bottom: 1px solid var(--gray-border); display: flex; position: sticky; top: 45px; z-index: 99; }
        .tab { flex: 1; padding: 12px 4px; text-align: center; font-size: 16px; color: var(--text-muted); cursor: pointer; border-bottom: 3px solid transparent; transition: 0.2s; }
        .tab.active { color: var(--blue); border-bottom-color: var(--blue); font-weight: 700; }
        .hidden { display: none !important; }

        /* 컨트롤 바 */
        .ctrl-row { background: white; display: flex; align-items: center; padding: 10px 8px; gap: 4px; border-bottom: 1px solid var(--gray-border); overflow-x: auto; }
        .ctrl-label { font-size: 13px; font-weight: 700; color: var(--text); white-space: nowrap; }
        .month-group { display: flex; gap: 4px; flex-shrink: 0; }
        .mo-btn { border: 1.5px solid #C5CAE9; border-radius: 5px; padding: 5px 8px; font-size: 12px; font-weight: 700; color: var(--text-muted); background: white; white-space: nowrap; }
        .mo-btn.active { background: var(--blue); color: white; border-color: var(--blue); }
        
        .thr-inp { border: 1.5px solid var(--orange); border-radius: 5px; padding: 3px; font-size: 13px; font-weight: 700; color: var(--orange); width: 40px; text-align: center; }

        .mgmt-tip { background: #FFF8E1; border-left: 3px solid #FFB300; padding: 8px 10px; font-size: 13px; font-weight: 700; color: #5D4037; }
        
        /* 테이블 스타일 보정 */
        .tbl-wrap { background: white; overflow-x: auto; -webkit-overflow-scrolling: touch; }
        table { width: 100%; border-collapse: collapse; min-width: 480px; }
        .sy-table th { font-weight: 700; font-size: 11px; padding: 8px 2px; background: #f8f9fa; border-bottom: 1px solid #ddd; }
        .sy-table td { padding: 6px 2px; text-align: center; border-bottom: 0.5px solid var(--gray-border); font-size: 13px; }
        
        /* 입력란 모바일 최적화 */
        .n-inp { width: 42px; height: 30px; border: 1.5px solid #1565C0; border-radius: 4px; text-align: center; font-size: 14px; font-weight: 700; color: #0D47A1; -webkit-appearance: none; }
        .n-inp.m { width: 50px; border-color: var(--orange); color: var(--orange); }

        /* 수정 패널 */
        .panel { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 90%; max-width: 400px; background: white; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 1000; padding: 16px; }
        .panel-backdrop { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 999; }
    </style>
</head>
<body>

<div class="app">
    <div class="header">
        <span>⚡</span>
        <span class="header-title">점프UP MANAGER</span>
        <span class="header-date">2026.04.19</span>
    </div>

    <div class="tab-bar">
        <div class="tab active" onclick="showTab('sy')" id="tab-sy">📋 생산율</div>
        <div class="tab" onclick="showTab('369')" id="tab-369">📊 3.6.9</div>
    </div>

    <div id="view-sy">
        <div class="ctrl-row">
            <span class="ctrl-label">월</span>
            <div class="month-group" id="mg-sy">
                <button class="mo-btn" onclick="setMo('sy',4)" data-mo="4">4월</button>
                <button class="mo-btn active" onclick="setMo('sy',5)" data-mo="5">5월</button>
                <button class="mo-btn" onclick="setMo('sy',6)" data-mo="6">6월</button>
                <button class="mo-btn" onclick="setMo('sy',7)" data-mo="7">7월</button>
            </div>
            <div style="flex:1"></div>
            <span class="ctrl-label">기준</span>
            <input class="thr-inp" type="number" id="thr-sy" value="3" inputmode="decimal" oninput="updateSYResults()"/>
            <button class="mo-btn" style="border-color:var(--blue); color:var(--blue)" onclick="togglePanel(true)">✏️직원</button>
        </div>

        <div class="mgmt-tip">💛 관리계정: 팀장 직접 입력</div>

        <div class="tbl-wrap">
            <table class="sy-table">
                <thead>
                    <tr>
                        <th style="width:50px">이름</th>
                        <th style="color:var(--orange)">관리</th>
                        <th style="color:var(--blue)">신규</th>
                        <th style="color:var(--green)">재랜탈</th>
                        <th style="color:var(--teal)">자가</th>
                        <th>생산율</th>
                        <th>건수</th>
                        <th>부족</th>
                        <th>지급액</th>
                    </tr>
                </thead>
                <tbody id="sy-tbody"></tbody>
                <tfoot id="sy-tfoot"></tfoot>
            </table>
        </div>
    </div>

    <div id="view-369" class="hidden">
        </div>

    <div id="panel-root" class="hidden">
        <div class="panel-backdrop" onclick="togglePanel(false)"></div>
        <div class="panel">
            <h3 style="margin-bottom:12px">직원 관리</h3>
            <div id="edit-list" style="max-height: 300px; overflow-y: auto;"></div>
            <div style="display:flex; gap:5px; margin-top:10px">
                <input id="new-name-inp" class="n-inp" style="flex:1; width:auto; text-align:left; padding-left:10px" placeholder="이름 입력">
                <button class="mo-btn active" onclick="addMember()">추가</button>
            </div>
            <div style="margin-top:15px; text-align:right">
                <button class="mo-btn" onclick="togglePanel(false)">닫기</button>
                <button class="mo-btn active" onclick="savePanel()">저장하기</button>
            </div>
        </div>
    </div>
</div>

<script>
    // 1. 초기 데이터 설정
    let members = ['박행신','강승임','박일녀','임병순','김태효','전숙경','이은이','우영미'];
    const mkD = () => ({mgmt:0, n:0, r:0, s:0});

    // DB 초기화 시 깊은 복사 처리
    let db = {
        4: members.map(() => mkD()),
        5: [
            {mgmt:236,n:3,r:6,s:0},{mgmt:250,n:10,r:2,s:0},{mgmt:283,n:17,r:15,s:0},
            {mgmt:239,n:0,r:5,s:0},{mgmt:234,n:0,r:3,s:0},{mgmt:228,n:10,r:6,s:0},
            {mgmt:146,n:7,r:2,s:0},{mgmt:275,n:13,r:7,s:0}
        ],
        6: members.map(() => mkD()), 
        7: members.map(() => mkD())
    };

    let curMoSY = 5;

    // 2. 핵심 계산 함수 (방어 코드 추가)
    const calcHW = (n, r, s) => (Number(n)||0) * 1.0 + (Number(r)||0) * 0.5 + (Number(s)||0) * 1.0;
    const calcSY = (mgmt, hw) => (mgmt > 0) ? (hw / mgmt * 100) : 0;
    
    function getSYBonus(hw, sy) {
        if (hw < 7) return 0;
        if (sy >= 7) return 4.5;
        if (sy >= 5) return 3.5;
        if (sy >= 3) return 2.0;
        return 0;
    }

    // 3. 렌더링 함수
    function renderSY() {
        const data = db[curMoSY];
        let html = '';
        members.forEach((name, i) => {
            const d = data[i] || mkD();
            html += `
                <tr>
                    <td style="font-weight:700">${name}</td>
                    <td><input type="number" class="n-inp m" value="${d.mgmt||''}" oninput="updDB(${i},'mgmt',this.value)" inputmode="decimal"></td>
                    <td><input type="number" class="n-inp" value="${d.n||''}" oninput="updDB(${i},'n',this.value)" inputmode="decimal"></td>
                    <td><input type="number" class="n-inp" style="border-color:var(--green)" value="${d.r||''}" oninput="updDB(${i},'r',this.value)" inputmode="decimal"></td>
                    <td><input type="number" class="n-inp" style="border-color:var(--teal)" value="${d.s||''}" oninput="updDB(${i},'s',this.value)" inputmode="decimal"></td>
                    <td id="sy-val-${i}">-</td>
                    <td id="hw-val-${i}">-</td>
                    <td id="gap-val-${i}">-</td>
                    <td id="pay-val-${i}" style="font-size:10px">-</td>
                </tr>`;
        });
        document.getElementById('sy-tbody').innerHTML = html;
        updateSYResults();
    }

    function updDB(idx, field, val) {
        db[curMoSY][idx][field] = parseFloat(val) || 0;
        updateSYResults();
    }

    function updateSYResults() {
        const thr = parseFloat(document.getElementById('thr-sy').value) || 0;
        let tM=0, tN=0, tR=0, tS=0, tPay=0;

        members.forEach((_, i) => {
            const d = db[curMoSY][i];
            const hw = calcHW(d.n, d.r, d.s);
            const sy = calcSY(d.mgmt, hw);
            const bonus = getSYBonus(hw, sy);
            const pay = hw * bonus;

            tM += d.mgmt; tN += d.n; tR += d.r; tS += d.s; tPay += pay;

            document.getElementById(`sy-val-${i}`).textContent = d.mgmt ? sy.toFixed(1) + '%' : '-';
            document.getElementById(`hw-val-${i}`).textContent = hw ? hw.toFixed(1) : '-';
            
            const gap = sy - thr;
            const gapEl = document.getElementById(`gap-val-${i}`);
            gapEl.textContent = d.mgmt ? (gap > 0 ? '+' : '') + gap.toFixed(1) + '%' : '-';
            gapEl.style.color = gap >= 0 ? 'var(--green)' : 'var(--red)';

            const payEl = document.getElementById(`pay-val-${i}`);
            payEl.textContent = pay > 0 ? Math.round(pay*10000).toLocaleString() + '원' : (hw >= 7 ? '생산율미달' : '-');
            payEl.style.color = pay > 0 ? 'var(--green)' : '#999';
        });

        // 합계 영역 업데이트 (생략 가능하나 기능 유지를 위해 구현)
        const tHW = calcHW(tN, tR, tS);
        document.getElementById('sy-tfoot').innerHTML = `
            <tr style="background:#E8F5E9; font-weight:700">
                <td>팀합계</td><td>${tM}</td><td>${tN}</td><td>${tR}</td><td>${tS}</td>
                <td>-</td><td>${tHW.toFixed(1)}</td><td>-</td><td>${Math.round(tPay*10000).toLocaleString()}원</td>
            </tr>`;
    }

    // 4. 모달 및 탭 제어
    function showTab(tab) {
        document.getElementById('view-sy').classList.toggle('hidden', tab !== 'sy');
        document.getElementById('view-369').classList.toggle('hidden', tab !== '369');
        document.getElementById('tab-sy').classList.toggle('active', tab === 'sy');
        document.getElementById('tab-369').classList.toggle('active', tab === '369');
    }

    function setMo(tab, mo) {
        curMoSY = mo;
        document.querySelectorAll('#mg-sy .mo-btn').forEach(b => b.classList.toggle('active', parseInt(b.dataset.mo) === mo));
        renderSY();
    }

    function togglePanel(show) {
        document.getElementById('panel-root').classList.toggle('hidden', !show);
        if(show) {
            const list = document.getElementById('edit-list');
            list.innerHTML = members.map((m, i) => `
                <div style="display:flex; align-items:center; margin-bottom:8px">
                    <input class="n-inp" style="flex:1; width:auto; text-align:left; padding-left:10px" value="${m}" onchange="members[${i}]=this.value">
                    <button onclick="delMember(${i})" style="color:red; background:none; border:none; margin-left:10px">삭제</button>
                </div>
            `).join('');
        }
    }

    function addMember() {
        const name = document.getElementById('new-name-inp').value.trim();
        if(name) {
            members.push(name);
            [4,5,6,7].forEach(m => db[m].push(mkD()));
            document.getElementById('new-name-inp').value = '';
            togglePanel(true);
        }
    }

    function delMember(i) {
        members.splice(i, 1);
        [4,5,6,7].forEach(m => db[m].splice(i, 1));
        togglePanel(true);
    }

    function savePanel() {
        togglePanel(false);
        renderSY();
    }

    // 초기 실행
    window.onload = renderSY;
</script>

</body>
</html>
