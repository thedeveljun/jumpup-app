```html
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>점프UP MANAGER</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Noto Sans KR', sans-serif; }
:root {
  --blue:#1565C0; --green:#2E7D32; --orange:#E65100; --red:#C62828;
  --purple:#6A1B9A; --teal:#00695C; --gray-bg:#F5F5F5; --gray-border:#E0E0E0;
  --text:#212121; --text-muted:#9E9E9E;
}
.app { max-width:480px; margin:0 auto; background:var(--gray-bg); min-height:100vh; }

.header { background:#1A73E8; color:white; padding:11px 14px; display:flex; align-items:center; gap:8px; }
.header-title { font-size:17px; font-weight:700; flex:1; }
.header-date { font-size:13px; color:rgba(255,255,255,0.8); }

.tab-bar { background:white; border-bottom:1px solid var(--gray-border); display:flex; }
.tab { flex:1; padding:10px 4px; text-align:center; font-size:18px; color:var(--text-muted); cursor:pointer; border-bottom:3px solid transparent; }
.tab.active { color:var(--blue); border-bottom-color:var(--blue); font-weight:700; }
.hidden { display:none; }

.ctrl-row { background:white; display:flex; align-items:center; padding:7px 10px; gap:8px; border-bottom:1px solid var(--gray-border); }
.ctrl-label-sm { font-size:14px; font-weight:700; }
.thr-inp { border:1.5px solid var(--orange); border-radius:5px; padding:4px; font-size:15px; font-weight:700; color:var(--orange); width:50px; text-align:center; }
.ctrl-pct { font-size:14px; color:var(--orange); font-weight:700; }
.btn-edit-ctrl { margin-left:auto; background:white; color:var(--blue); border:1.5px solid var(--blue); border-radius:5px; padding:4px 10px; font-size:13px; font-weight:700; cursor:pointer; }

.tbl-wrap { background:white; overflow-x:auto; }
table { border-collapse:collapse; font-size:13px; white-space:nowrap; }

.sy-table th, .sy-table td { padding:5px; text-align:center; border-bottom:1px solid var(--gray-border); }
.sy-table th { background:#CFD8DC; }

.name { background:#FAFAFA; font-weight:700; position:sticky; left:0; }

.n-inp {
  width:45px;
  border:1.5px solid #1565C0;
  border-radius:4px;
  padding:4px;
  text-align:center;
  font-size:13px;
  font-weight:700;
}
.n-inp.r { border-color:#2E7D32; }
.n-inp.s { border-color:#00695C; }
.n-inp.m { border-color:#E65100; }

.pay-cell { color:var(--green); font-weight:700; }
.no-pay-cell { color:#BDBDBD; }

.total-row td { background:#E8F5E9; font-weight:700; }

</style>

<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;700&display=swap" rel="stylesheet">
</head>

<body>

<div class="app">

<div class="header">
  <span>⚡</span>
  <span class="header-title">점프UP MANAGER</span>
  <span class="header-date">2026.04.19</span>
</div>

<div class="ctrl-row">
  <span class="ctrl-label-sm">부족기준</span>
  <input class="thr-inp" type="number" id="thr-sy" value="3"
    oninput="updateSYResults()" inputmode="numeric">
  <span class="ctrl-pct">%</span>
</div>

<div class="tbl-wrap">
<table class="sy-table">
<thead>
<tr>
<th>이름</th>
<th>관리</th>
<th>신규</th>
<th>재랜탈</th>
<th>자가</th>
<th>생산율</th>
<th>건수</th>
<th>부족</th>
<th>금액</th>
</tr>
</thead>

<tbody id="tbody"></tbody>
<tfoot id="tfoot"></tfoot>

</table>
</div>

</div>

<script>

let members = ['박행신','강승임','박일녀','임병순'];

const db = members.map(()=>({mgmt:0,n:0,r:0,s:0}));

function calcHW(n,r,s){ return n + r*0.5 + s; }
function calcSY(mgmt,n,r,s){ return mgmt ? calcHW(n,r,s)/mgmt*100 : 0; }

function updDB(i, field, val){
  let num = 0;

  if(val !== '' && val !== null && val !== undefined){
    num = Number(val);
    if(isNaN(num)) num = 0;
  }

  db[i][field] = Math.max(0, num);
  updateSYResults();
}

function render(){

  let html = '';

  members.forEach((name,i)=>{

    html += `
    <tr id="row-${i}">
      <td class="name">${name}</td>

      <td><input class="n-inp m" type="number" inputmode="numeric"
        oninput="updDB(${i},'mgmt',this.value)"></td>

      <td><input class="n-inp" type="number" inputmode="numeric"
        oninput="updDB(${i},'n',this.value)"></td>

      <td><input class="n-inp r" type="number" inputmode="numeric"
        oninput="updDB(${i},'r',this.value)"></td>

      <td><input class="n-inp s" type="number" inputmode="numeric"
        oninput="updDB(${i},'s',this.value)"></td>

      <td>-</td>
      <td>-</td>
      <td>-</td>
      <td>-</td>
    </tr>`;
  });

  document.getElementById('tbody').innerHTML = html;
}

function updateSYResults(){

  const thr = Number(document.getElementById('thr-sy').value) || 3;

  let total = 0;

  members.forEach((_,i)=>{

    const {mgmt,n,r,s} = db[i];

    const hw = calcHW(n,r,s);
    const sy = calcSY(mgmt,n,r,s);

    const diff = sy - thr;

    const pay = hw >= 7 ? hw * 2 : 0;

    total += pay;

    const row = document.getElementById('row-'+i);

    row.cells[5].innerText = sy.toFixed(1)+'%';
    row.cells[6].innerText = hw.toFixed(1);
    row.cells[7].innerText = diff.toFixed(1)+'%';
    row.cells[8].innerText = pay>0 ? Math.round(pay*10000)+'원' : '-';

  });

  document.getElementById('tfoot').innerHTML =
    `<tr class="total-row"><td colspan="8">합계</td><td>${Math.round(total*10000)}원</td></tr>`;
}

render();

</script>

</body>
</html>
